{% extends 'base.html' %}

{% block body_attr %}
{% endblock %}

{% block pagestyle %}
<meta http-equiv="refresh" content="5">
{% endblock %}

{% block content %}

<div class="ui container">

  <h1> Cribs ticker for {{exam.name}} </h1>


{% for q, tokens in called.items %} 
  <span class="ui button green" >Q{{q}} <br>
   {% for token in tokens %} 
    <br> {{token}}
   {% endfor %}
  </span>
{% endfor %}
  <!-- style="border: 1px solid black" -->
 
</div>

{% endblock %}
